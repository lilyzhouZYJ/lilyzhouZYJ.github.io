---
layout: default
---

{% include navbar.html %}

<div class="container">
    <h2> {{page.title}} </h2>

    {{content}}

    {% for tag in site.tags %}
        {%- if tag[0] == "projects" -%}
            <h3>{{ tag[0] | capitalize}}</h3>
            <ul>
            {% for post in tag[1] %}
                <li><a href="{{ post.url }}">{{ post.title }} - {{ post.date | date: "%B %-d, %Y" }}</a></li>
            {% endfor %}
            </ul>
        {%- endif -%}
    {% endfor %}

</div>
